name: "REHAU NEA Smart 2.0 Modbus to MQTT"
description: "Bridges a REHAU NEA Smart 2.0 heating system (Modbus TCP slave) with MQTT for Home Assistant integration."
version: "1.0.3"
slug: "ha-rehau-modbus-2-mqtt"
init: false
arch:
  - aarch64
  - amd64
startup: services
boot: auto

# HA injects MQTT credentials from the configured broker when present.
services:
  - mqtt:need

ports:
  502/tcp: 502
ports_description:
  502/tcp: Modbus entry port

options:
  log_level: "info"
  modbus_unit_id: 240
  mqtt_host: ""
  mqtt_port: "1883"
  mqtt_protocol: "mqtt"
  mqtt_username: ""
  mqtt_password: ""
  mqtt_reject_unauthorized: false
  mqtt_entity_prefix: "rehau"
  mqtt_topic: "homeassistant/climate"

schema:
  log_level: "list(trace|debug|info|warn|error|fatal)"
  modbus_unit_id: int
  mqtt_host: str
  mqtt_port: "int(1,65535)"
  mqtt_protocol: "list(mqtt|mqtts|ws|wss)"
  mqtt_username: str
  mqtt_password: str
  mqtt_reject_unauthorized: bool
  mqtt_entity_prefix: str
  mqtt_topic: str
